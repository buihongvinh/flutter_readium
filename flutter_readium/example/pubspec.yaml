name: flutter_readium_example
description: 'Demonstrates how to use the flutter_readium plugin.'
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # file_picker: # Removed temporarily since it does not compile with latest Kotlin version.
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1
  collection: ^1.19.1
  flutter_readium:
    # When depending on this package from a real application you should use:
    #   flutter_readium: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pointer_interceptor: ^0.10.1
  rxdart: ^0.28.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false
  assets:
    - assets/pubs/
    - assets/webManifestList.json
